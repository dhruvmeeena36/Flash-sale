<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Flash Sale — Flipkart Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .header {
      background: #F3A847;
      width: 100%;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: fixed;
      top: 0;
    }
    .header h1 { font-size: 22px; color: #111; font-weight: 800; }
    .header span { font-size: 13px; color: #333; }

    .container {
      margin-top: 80px;
      max-width: 500px;
      width: 90%;
      padding: 20px 0;
    }

    .product-card {
      background: #1a1a1a;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(243, 168, 71, 0.2);
    }

    .product-image {
      background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .product-info { padding: 24px; }
    .product-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .product-sub { color: #888; font-size: 13px; margin-bottom: 16px; }

    .price-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .price { font-size: 32px; font-weight: 800; color: #F3A847; }
    .price-original { text-decoration: line-through; color: #555; font-size: 18px; }
    .discount-badge {
      background: #2d6a2d;
      color: #5fc95f;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .stock-bar-wrap { margin-bottom: 20px; }
    .stock-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
      color: #aaa;
    }
    .stock-count { font-weight: 700; font-size: 15px; }
    .stock-count.critical { color: #ff4444; }
    .stock-count.low { color: #ff9800; }
    .stock-count.good { color: #4caf50; }

    .bar-bg { background: #2a2a2a; border-radius: 99px; height: 8px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, #ff4444, #F3A847);
    }

    .user-id-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    input {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #F3A847; }

    .buy-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #F3A847, #e8832a);
      color: #111;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .buy-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(243,168,71,0.4); }
    .buy-btn:active:not(:disabled) { transform: translateY(0); }
    .buy-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .toast {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: #1a3a1a; border: 1px solid #2d6a2d; color: #5fc95f; display: block; }
    .toast.error   { background: #3a1a1a; border: 1px solid #6a2d2d; color: #fc6b6b; display: block; }
    .toast.warning { background: #3a2f1a; border: 1px solid #6a5a2d; color: #ffc107; display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }
    .stat-box {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 800; color: #F3A847; }
    .stat-label { font-size: 11px; color: #666; margin-top: 4px; }

    .sold-out-overlay {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      display: none;
    }
    .sold-out-overlay.visible { display: block; }
    .sold-out-overlay .emoji { font-size: 60px; margin-bottom: 16px; }
    .sold-out-overlay h2 { font-size: 28px; font-weight: 800; color: #ff4444; }
    .sold-out-overlay p { color: #888; margin-top: 8px; }

    .refresh-btn {
      margin-top: 12px;
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { border-color: #F3A847; color: #F3A847; }
  </style>
</head>
<body>

<div class="header">
  <h1>⚡ FlipMart Flash Sale</h1>
  <span>Big Billion Days Special</span>
</div>

<div class="container">

  <!-- Sold Out View -->
  <div class="sold-out-overlay" id="soldOutView">
    <div class="emoji">😔</div>
    <h2>SOLD OUT!</h2>
    <p>All items were claimed. You were so close!</p>
    <button class="refresh-btn" onclick="resetAndRefresh()">🔄 Reset Sale (Demo)</button>
  </div>

  <!-- Product Card -->
  <div class="product-card" id="productCard">
    <div class="product-image">📱</div>
    <div class="product-info">

      <div class="product-name">iPhone 15 Pro Max</div>
      <div class="product-sub">256GB • Titanium Black • 1 per user</div>

      <div class="price-row">
        <div class="price" id="price">₹1,29,999</div>
        <div class="price-original">₹1,79,999</div>
        <div class="discount-badge">28% OFF</div>
      </div>

      <div class="stock-bar-wrap">
        <div class="stock-label">
          <span>Stock Remaining</span>
          <span class="stock-count" id="stockCount">Loading...</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" id="stockBar" style="width: 100%"></div>
        </div>
      </div>

      <div class="user-id-row">
        <input type="text" id="userId" placeholder="Your User ID (e.g. dhruv_123)" value="user_dhruv" />
      </div>

      <button class="buy-btn" id="buyBtn" onclick="buyNow()">
        ⚡ BUY NOW
      </button>

      <div class="toast" id="toast"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="statOrders">0</div>
      <div class="stat-label">Orders Placed</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statStock">—</div>
      <div class="stat-label">Items Left</div>
    </div>
  </div>

</div>

<script>
  const API = "http://localhost:3002";
  let maxStock = 100; // Will be inferred from first load
  let currentStock = 0;

  async function fetchStock() {
    try {
      const res = await fetch(`${API}/stock`);
      const data = await res.json();

      currentStock = data.stock;

      // Update stock display
      const stockCount = document.getElementById("stockCount");
      stockCount.textContent = `${data.stock} left`;

      if (data.stock <= 2) {
        stockCount.className = "stock-count critical";
      } else if (data.stock <= 20) {
        stockCount.className = "stock-count low";
      } else {
        stockCount.className = "stock-count good";
      }

      // Update bar width (assume max stock for width calc)
      const pct = Math.max(0, Math.min(100, (data.stock / maxStock) * 100));
      document.getElementById("stockBar").style.width = pct + "%";

      // Update stats
      document.getElementById("statOrders").textContent = data.totalOrders;
      document.getElementById("statStock").textContent = data.stock;

      // Show sold out if needed
      if (data.isSoldOut) {
        document.getElementById("soldOutView").classList.add("visible");
        document.getElementById("productCard").style.display = "none";
      }
    } catch (e) {
      document.getElementById("stockCount").textContent = "Server offline";
    }
  }

  async function buyNow() {
    const userId = document.getElementById("userId").value.trim();
    if (!userId) {
      showToast("Please enter your User ID", "warning");
      return;
    }

    const btn = document.getElementById("buyBtn");
    btn.disabled = true;
    btn.textContent = "⏳ Processing...";

    try {
      const res = await fetch(`${API}/buy`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, productId: "IPHONE_15_PRO" }),
      });
      const data = await res.json();

      if (res.ok) {
        showToast(`🎉 ${data.message}\nOrder: ${data.orderId.slice(0,8)}...`, "success");
        btn.textContent = "✅ Order Placed!";
        btn.style.background = "linear-gradient(135deg, #2d6a2d, #1a4a1a)";
        btn.style.color = "#5fc95f";
        setTimeout(() => fetchStock(), 500);
      } else {
        showToast(data.message || "Purchase failed", res.status === 409 ? "error" : "warning");
        btn.disabled = false;
        btn.textContent = "⚡ BUY NOW";
      }
    } catch {
      showToast("❌ Cannot connect to server. Is it running?", "error");
      btn.disabled = false;
      btn.textContent = "⚡ BUY NOW";
    }
  }

  function showToast(message, type) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = `toast ${type}`;
  }

  async function resetAndRefresh() {
    await fetch(`${API}/reset`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stock: 10 }),
    });
    document.getElementById("soldOutView").classList.remove("visible");
    document.getElementById("productCard").style.display = "block";
    document.getElementById("buyBtn").disabled = false;
    document.getElementById("buyBtn").textContent = "⚡ BUY NOW";
    document.getElementById("buyBtn").style.background = "";
    document.getElementById("buyBtn").style.color = "";
    document.getElementById("toast").className = "toast";
    maxStock = 10;
    fetchStock();
  }

  // Poll stock every 2 seconds (real-time feel)
  fetchStock();
  setInterval(fetchStock, 2000);
</script>
</body>
</html>
